name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  resolve-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve configured latest patch versions
        run: |
          python scripts/resolve_latest_patch.py --majors-file config/majors.json > versions.json
          cat versions.json

      - name: Validate resolved versions shape
        shell: python
        run: |
          import json
          from pathlib import Path

          payload = json.loads(Path("versions.json").read_text(encoding="utf-8"))
          assert payload, "resolved versions output is empty"
          for major, full in payload.items():
              assert full.startswith(f"{major}."), f"{full} does not match major {major}"

  script-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python scripts
        run: python -m compileall scripts

      - name: Smoke test validation CLIs
        run: |
          python scripts/check_stdlib.py --help
          python scripts/validate_distribution.py --help